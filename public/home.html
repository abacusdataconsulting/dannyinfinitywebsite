<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny Infinity | Music Producer</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <div class="home-container container">
        <!-- Header -->
        <header class="site-header">
            <div class="site-logo">DANNY<span class="logo-accent">INFINITY</span></div>
            <nav class="site-nav">
                <a href="home.html" class="nav-link active">HOME</a>
                <a href="music.html" class="nav-link">MUSIC</a>
                <a href="videos.html" class="nav-link">VIDEOS</a>
                <a href="photos.html" class="nav-link">PHOTOS</a>
                <a href="blog.html" class="nav-link">BLOG</a>
                <a href="sheet-music.html" class="nav-link">SHEETS</a>
            </nav>
        </header>

        <!-- Link Stack -->
        <nav class="link-stack" id="link-stack">
            <a href="sheet-music.html" class="link-btn">Sheet Music</a>
            <a href="music.html" class="link-btn">Audio</a>
            <a href="videos.html" class="link-btn">Videos</a>
            <a href="photos.html" class="link-btn">Photos</a>
            <a href="blog.html" class="link-btn">Blog</a>
            <a href="#" class="link-btn" id="account-link" style="display: none;">Account</a>
            <a href="admin.html" class="link-btn" id="admin-link" style="display: none;">Admin</a>
        </nav>

        <!-- Footer -->
        <footer class="site-footer">
            <div class="footer-content">
                <p class="footer-text">&gt; DANNY INFINITY // <span id="current-year">2024</span></p>
            </div>
            <a href="index.html" class="logout-link">[DISCONNECT]</a>
        </footer>
    </div>

    <script>
        (function() {
            const userName = sessionStorage.getItem('userName');
            const accessLevel = sessionStorage.getItem('accessLevel') || 'guest';
            const authToken = sessionStorage.getItem('authToken');
            const userRaw = sessionStorage.getItem('user');

            // Show auth-gated links based on access level
            if (accessLevel === 'member' && authToken) {
                document.getElementById('account-link').style.display = '';

                // Check admin status
                if (userRaw) {
                    try {
                        var userData = JSON.parse(userRaw);
                        if (userData.isAdmin) {
                            document.getElementById('admin-link').style.display = '';
                        }
                    } catch (e) {}
                }
            }

            // Update year
            document.getElementById('current-year').textContent = new Date().getFullYear();

            // Scroll to link stack when arriving from splash page
            if (window.location.hash === '#links') {
                document.getElementById('link-stack').scrollIntoView();
                history.replaceState(null, '', window.location.pathname);
            }
        })();
    </script>
</body>
</html>
