name = "abacus-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Local development settings
[vars]
ENVIRONMENT = "development"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "abacus-db"
database_id = "local-dev-db"  # Replace with real ID after: wrangler d1 create abacus-db

# For local development, Wrangler will create a local SQLite file
# Run: wrangler d1 execute abacus-db --local --file=schema.sql
